# ┆ Desk setup - three++ monitor configuration

$center_monitor  = DP-1
$left_monitor    = DP-2
$primary_monitor = DP-1
$right_monitor   = HDMI-A-1
$top_monitor     = HDMI-A-3
$tv_monitor      = HDMI-A-2

# Layout
monitor = $center_monitor,3840x2160@120,0x0,2
monitor = $left_monitor,preferred,-1920x0,2
monitor = $right_monitor,preferred,1920x0,2
monitor = $top_monitor,preferred,0x-1080,1.5
monitor = $tv_monitor,disable

source = ./desk_rules.conf

exec = xrandr --output $primary_monitor --primary
env = PROTON_WAYLAND_MONITOR,$primary_monitor

## Examples
# monitor = $center_monitor,3840x2160@120,1920x0,2
# monitor = $top_monitor,preferred,1920x-1080,1
